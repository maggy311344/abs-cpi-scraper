name: Auto Fetch ABS CPI

on:
  schedule:
    # 這裡設定定時任務。ABS CPI 是季度更新（通常在 1, 4, 7, 10 月底），
    # 我們可以設定每週一早上 8:00 (UTC) 跑一次，確保能抓到最新資料。
    - cron: '0 8 * * 1'
  workflow_dispatch: # 允許手動點擊按鈕執行

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 允許 Actions 把更新後的 CSV 推送回倉庫

    steps:
    - name: 檢查倉庫程式碼
      uses: actions/checkout@v4

    - name: 設定 Python 環境
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 安裝必要套件
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4 pandas openpyxl

    - name: 執行爬蟲腳本
      run: python scraper.py

    - name: 檢查檔案是否有變更並提交
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add cpi_australia.csv
        # 只有在檔案有變動時才 commit，避免報錯
        git diff-index --quiet HEAD || git commit -m "Automated update: CPI Data"
        git push
